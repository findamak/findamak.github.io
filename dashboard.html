<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #21262d;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent-btc: #f7931a;
            --accent-eth: #627eea;
            --border: #30363d;
            --success: #3fb950;
            --danger: #f85149;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .last-updated {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }

        .price-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .price-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .price-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .price-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .crypto-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .crypto-name {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .crypto-symbol {
            color: var(--text-secondary);
            font-size: 0.875rem;
            text-transform: uppercase;
        }

        .price-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .price-change {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .price-change.positive {
            background: rgba(63, 185, 80, 0.15);
            color: var(--success);
        }

        .price-change.negative {
            background: rgba(248, 81, 73, 0.15);
            color: var(--danger);
        }

        .loading {
            color: var(--text-secondary);
            font-style: italic;
        }

        .error {
            color: var(--danger);
            font-size: 0.875rem;
        }

        /* X Feed Section */
        .x-feed-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-top: 2rem;
        }

        .x-feed-section h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .x-feed-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .x-feed-updated {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .x-feed-grid {
            display: grid;
            gap: 1rem;
        }

        .x-tweet-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            transition: border-color 0.2s;
        }

        .x-tweet-card:hover {
            border-color: var(--text-secondary);
        }

        .x-tweet-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }

        .x-user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--bg-secondary);
        }

        .x-user-info {
            flex: 1;
        }

        .x-user-name {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .x-user-handle {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .x-tweet-time {
            color: var(--text-secondary);
            font-size: 0.8rem;
            white-space: nowrap;
        }

        .x-tweet-text {
            color: var(--text-primary);
            line-height: 1.5;
            font-size: 0.95rem;
            word-wrap: break-word;
        }

        .x-tweet-link {
            display: inline-block;
            margin-top: 0.75rem;
            color: var(--accent-eth);
            text-decoration: none;
            font-size: 0.85rem;
        }

        .x-tweet-link:hover {
            text-decoration: underline;
        }

        .x-feed-loading {
            color: var(--text-secondary);
            font-style: italic;
            padding: 2rem;
            text-align: center;
        }

        .x-feed-error {
            color: var(--danger);
            padding: 1rem;
            background: rgba(248, 81, 73, 0.1);
            border-radius: 8px;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 Crypto Dashboard</h1>
            <p class="last-updated">Last updated: <span id="lastUpdated">--</span></p>
        </header>

        <div class="price-grid">
            <!-- Bitcoin Card -->
            <div class="price-card">
                <div class="price-header">
                    <img src="https://assets.coingecko.com/coins/images/1/small/bitcoin.png" alt="Bitcoin" class="crypto-icon">
                    <div>
                        <div class="crypto-name">Bitcoin</div>
                        <div class="crypto-symbol">BTC</div>
                    </div>
                </div>
                <div class="price-value" id="btc-price">
                    <span class="loading">Loading...</span>
                </div>
                <div class="price-change" id="btc-change">
                    --
                </div>
            </div>

            <!-- Ethereum Card -->
            <div class="price-card">
                <div class="price-header">
                    <img src="https://assets.coingecko.com/coins/images/279/small/ethereum.png" alt="Ethereum" class="crypto-icon">
                    <div>
                        <div class="crypto-name">Ethereum</div>
                        <div class="crypto-symbol">ETH</div>
                    </div>
                </div>
                <div class="price-value" id="eth-price">
                    <span class="loading">Loading...</span>
                </div>
                <div class="price-change" id="eth-change">
                    --
                </div>
            </div>
        </div>

        <!-- X Feed Section -->
        <div class="x-feed-section">
            <div class="x-feed-header">
                <h2>🐦 X Feed</h2>
                <span class="x-feed-updated">Last updated: <span id="xFeedUpdated">--</span></span>
            </div>
            <div class="x-feed-grid" id="x-feed-container">
                <div class="x-feed-loading">Loading recent posts...</div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd&include_24hr_change=true';

        async function fetchPrices() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('API request failed');
                const data = await response.json();

                updatePriceCard('btc', data.bitcoin);
                updatePriceCard('eth', data.ethereum);

                document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString('en-AU', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
            } catch (error) {
                console.error('Error fetching prices:', error);
                document.getElementById('btc-price').innerHTML = '<span class="error">Failed to load</span>';
                document.getElementById('eth-price').innerHTML = '<span class="error">Failed to load</span>';
            }
        }

        function updatePriceCard(crypto, data) {
            const priceEl = document.getElementById(`${crypto}-price`);
            const changeEl = document.getElementById(`${crypto}-change`);

            const price = data.usd.toLocaleString('en-US', {
                style: 'currency',
                currency: 'USD',
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });

            const change = data.usd_24h_change.toFixed(2);
            const isPositive = data.usd_24h_change >= 0;

            priceEl.textContent = price;
            changeEl.className = `price-change ${isPositive ? 'positive' : 'negative'}`;
            changeEl.innerHTML = `${isPositive ? '↑' : '↓'} ${change}%`;
        }

        // Initial fetch
        fetchPrices();

        // Update every minute
        setInterval(fetchPrices, 60000);

        // X Feed
        const X_FEED_URL = 'x-feed.json';

        async function fetchXFeed() {
            try {
                const response = await fetch(X_FEED_URL);
                if (!response.ok) throw new Error('Failed to load X feed');
                const data = await response.json();

                const container = document.getElementById('x-feed-container');
                const updatedEl = document.getElementById('xFeedUpdated');

                // Update timestamp
                if (data.lastUpdated) {
                    updatedEl.textContent = new Date(data.lastUpdated).toLocaleString('en-AU', {
                        dateStyle: 'medium',
                        timeStyle: 'short'
                    });
                }

                // Clear loading message
                container.innerHTML = '';

                if (!data.tweets || data.tweets.length === 0) {
                    container.innerHTML = '<div class="x-feed-loading">No recent posts found. Feed updates daily at 6am.</div>';
                    return;
                }

                // Filter tweets from last 24 hours
                const now = new Date();
                const twentyFourHoursAgo = new Date(now.getTime() - 24 * 60 * 60 * 1000);

                const recentTweets = data.tweets.filter(tweet => {
                    const tweetDate = new Date(tweet.pubDate);
                    return tweetDate >= twentyFourHoursAgo;
                });

                if (recentTweets.length === 0) {
                    container.innerHTML = '<div class="x-feed-loading">No posts from the last 24 hours.</div>';
                    return;
                }

                // Sort by date (newest first)
                recentTweets.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));

                // Render tweets
                recentTweets.forEach(tweet => {
                    const card = document.createElement('div');
                    card.className = 'x-tweet-card';

                    const tweetDate = new Date(tweet.pubDate);
                    const timeAgo = getTimeAgo(tweetDate);

                    card.innerHTML = `
                        <div class="x-tweet-header">
                            <img src="https://github.com/${tweet.user}.png" alt="${tweet.user}" class="x-user-avatar" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%2321262d%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%238b949e%22 font-size=%2240%22>${tweet.user.charAt(0).toUpperCase()}</text></svg>'">
                            <div class="x-user-info">
                                <div class="x-user-name">${tweet.user}</div>
                                <div class="x-user-handle">@${tweet.user}</div>
                            </div>
                            <div class="x-tweet-time">${timeAgo}</div>
                        </div>
                        <div class="x-tweet-text">${escapeHtml(tweet.title)}</div>
                        <a href="${tweet.link}" target="_blank" rel="noopener" class="x-tweet-link">View on X →</a>
                    `;

                    container.appendChild(card);
                });

            } catch (error) {
                console.error('Error fetching X feed:', error);
                document.getElementById('x-feed-container').innerHTML = 
                    '<div class="x-feed-error">Failed to load X feed. The feed updates daily at 6am.</div>';
            }
        }

        function getTimeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            
            if (seconds < 60) return 'Just now';
            if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`;
            if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ago`;
            return `${Math.floor(seconds / 86400)}d ago`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initial X feed fetch
        fetchXFeed();
    </script>
</body>
</html>
